name = "monolithpy-pip-worker"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# All sensitive configuration is stored as secrets.
# Set them with:
#   npx wrangler secret put S3_ENDPOINT
#   npx wrangler secret put S3_BUCKET_NAME
#   npx wrangler secret put S3_ACCESS_KEY_ID
#   npx wrangler secret put S3_SECRET_ACCESS_KEY
#   npx wrangler secret put S3_REGION

[vars]
# Cache TTL in seconds (24 hours). Safe to keep as a plain variable.
CACHE_TTL = "86400"

